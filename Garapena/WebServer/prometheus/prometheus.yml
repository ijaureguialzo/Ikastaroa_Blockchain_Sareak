global:
  # Intervalo por defecto para recopilar métricas de todos los targets
  scrape_interval: 15s
  # Frecuencia con la que se evalúan reglas y alertas
  evaluation_interval: 15s

scrape_configs:
  - job_name: besu_nodes
    # Lista de nodos Besu remotos expuestos por su puerto de métricas
    static_configs:
      - targets:
          - 192.168.100.1:9545
          - 192.168.100.2:9545
          - 192.168.100.3:9545
          - 192.168.100.4:9545
