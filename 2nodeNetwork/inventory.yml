# Inventario para despliegue de nodos Besu y servidor web.

all:
  children:
    besu_nodes:
      hosts:
        besu_node1:
          ansible_host: 192.168.100.1
          node_index: 1
        besu_node2:
          ansible_host: 192.168.100.2
          node_index: 2
    webserver:
      hosts:
        web:
          ansible_host: 192.168.100.10
          ansible_connection: local
    all_servers:
      children:
        besu_nodes: { }
        webserver: { }
  vars:
    ansible_user: isard
    deploy_home: /home/isard
